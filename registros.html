<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registros financieros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <main class="container py-5">
        <h1 class="text-primary mb-4">Registro de movimientos</h1>

        <div id="loginCard" class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="h5">Iniciar sesión</h2>
                <form id="loginForm" class="row g-3">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                </form>
                <p id="loginMessage" class="mt-3 mb-0"></p>
            </div>
        </div>

        <section id="appSection" class="d-none">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Nuevo registro</h2>
                        <button id="logoutButton" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
                    </div>

                    <form id="registroForm" class="row g-3">
                        <div class="col-md-4">
                            <label for="fecha" class="form-label">Fecha</label>
                            <input type="date" id="fecha" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label for="monto" class="form-label">Monto (+/-)</label>
                            <input type="number" step="0.01" id="monto" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label for="categoria" class="form-label">Categoría</label>
                            <input type="text" id="categoria" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="destino" class="form-label">Destino</label>
                            <input type="text" id="destino" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="detalle" class="form-label">Detalle</label>
                            <input type="text" id="detalle" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success">Guardar registro</button>
                        </div>
                    </form>
                    <p id="registroMessage" class="mt-3 mb-0"></p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5">Historial</h2>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Monto</th>
                                    <th>Categoría</th>
                                    <th>Destino</th>
                                    <th>Detalle</th>
                                </tr>
                            </thead>
                            <tbody id="tablaRegistros"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const loginCard = document.getElementById('loginCard');
        const appSection = document.getElementById('appSection');
        const loginMessage = document.getElementById('loginMessage');
        const registroMessage = document.getElementById('registroMessage');
        const tablaRegistros = document.getElementById('tablaRegistros');

        function setMessage(element, message, success = false) {
            element.textContent = message;
            element.className = success ? 'text-success mt-3 mb-0' : 'text-danger mt-3 mb-0';
        }

        async function checkSession() {
            const response = await fetch('/api/session');
            const data = await response.json();

            if (data.authenticated) {
                loginCard.classList.add('d-none');
                appSection.classList.remove('d-none');
                await cargarRegistros();
            }
        }

        async function cargarRegistros() {
            const response = await fetch('/api/registros');
            if (!response.ok) return;

            const registros = await response.json();
            tablaRegistros.innerHTML = '';

            for (const registro of registros) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${registro.fecha}</td>
                    <td>${Number(registro.monto).toFixed(2)}</td>
                    <td>${registro.categoria}</td>
                    <td>${registro.destino}</td>
                    <td>${registro.detalle}</td>
                `;
                tablaRegistros.appendChild(row);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            loginMessage.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                setMessage(loginMessage, data.message || 'Error al iniciar sesión');
                return;
            }

            setMessage(loginMessage, 'Inicio de sesión exitoso', true);
            loginCard.classList.add('d-none');
            appSection.classList.remove('d-none');
            await cargarRegistros();
        });

        document.getElementById('registroForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            registroMessage.textContent = '';

            const payload = {
                fecha: document.getElementById('fecha').value,
                monto: document.getElementById('monto').value,
                categoria: document.getElementById('categoria').value.trim(),
                destino: document.getElementById('destino').value.trim(),
                detalle: document.getElementById('detalle').value.trim()
            };

            const response = await fetch('/api/registros', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                setMessage(registroMessage, data.message || 'No se pudo guardar el registro');
                return;
            }

            setMessage(registroMessage, 'Registro guardado correctamente', true);
            document.getElementById('registroForm').reset();
            await cargarRegistros();
        });

        document.getElementById('logoutButton').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            appSection.classList.add('d-none');
            loginCard.classList.remove('d-none');
            tablaRegistros.innerHTML = '';
            setMessage(loginMessage, 'Sesión cerrada', true);
        });

        checkSession();
    </script>
</body>
</html>
