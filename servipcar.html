<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Pro con Mapa y Tarifa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #map { height: 300px; width: 100%; border-radius: 10px; margin: 15px 0; border: 1px solid #eee; }
        .info-ruta { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; color: #1967d2; }
        .precio { font-size: 18px; font-weight: bold; color: #2e7d32; display: block; margin-top: 5px; }
        button { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #128C7E; transform: translateY(-2px); }
                .logo-container {
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
                    border-radius: 15px;
        }
        .logo-container img {
            width: 150px;
            height: auto;
            border-radius: 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-container">
        <img src="logoservipcars.png" alt="ServiPCar Logo" />
    </div>
    <h2>🚕 Solicitar Carrera</h2>
    <input id="origen-input" type="text" placeholder="¿Dónde te buscamos?">
    <input id="destino-input" type="text" placeholder="¿A dónde vas?">
    
    <div id="map"></div>

    <div id="detalle-ruta" class="info-ruta">
        <div>📍 Distancia: <span id="distancia">--</span></div>
        <div>⏱️ Tiempo: <span id="tiempo">--</span></div>
        <div class="precio">Total estimado: $<span id="costo">0</span></div>
    </div>
    
    <button onclick="enviarWhatsApp()">Confirmar y enviar WhatsApp</button>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7xD3YLLFNXlB4H9XrEXWkP_6XZL0l0L8&libraries=places"></script>

<script>
    let map, directionsService, directionsRenderer;
    let distText, tiempoText, costoFinal;
    const tarifaPorKm = 15;

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer();
        
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 19.4326, lng: -99.1332 },
            zoom: 12,
            disableDefaultUI: true
        });
        directionsRenderer.setMap(map);

        const origenInput = document.getElementById('origen-input');
        const destinoInput = document.getElementById('destino-input');
        
        const opt = { types: ['address'] };
        const autoOrigen = new google.maps.places.Autocomplete(origenInput, opt);
        const autoDestino = new google.maps.places.Autocomplete(destinoInput, opt);

        autoOrigen.addListener('place_changed', calcularTodo);
        autoDestino.addListener('place_changed', calcularTodo);
    }

    function calcularTodo() {
        const origen = document.getElementById('origen-input').value;
        const destino = document.getElementById('destino-input').value;

        if (origen && destino) {
            directionsService.route({
                origin: origen,
                destination: destino,
                travelMode: google.maps.TravelMode.DRIVING
            }, (response, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(response);
                    
                    const data = response.routes[0].legs[0];
                    distText = data.distance.text;
                    tiempoText = data.duration.text;
                    
                    const km = data.distance.value / 1000;
                    costoFinal = (km * tarifaPorKm).toFixed(2);

                    document.getElementById('distancia').innerText = distText;
                    document.getElementById('tiempo').innerText = tiempoText;
                    document.getElementById('costo').innerText = costoFinal;
                    document.getElementById('detalle-ruta').style.display = 'block';
                }
            });
        }
    }

    function enviarWhatsApp() {
        const telefono = "593997756470";
        const origen = document.getElementById('origen-input').value;
        const destino = document.getElementById('destino-input').value;

        if (!origen || !destino) {
            alert("Completa la ruta primero");
            return;
        }

        const msj = `🚖 *NUEVA RESERVA*\n\n` +
                    `📍 *Origen:* ${origen}\n` +
                    `🏁 *Destino:* ${destino}\n` +
                    `📏 *Distancia:* ${distText}\n` +
                    `⏳ *Duración:* ${tiempoText}\n` +
                    `💰 *Costo Est.:* $${costoFinal}\n\n` +
                    `🗺️ *Ruta:* https://www.google.com/maps/dir/${encodeURIComponent(origen)}/${encodeURIComponent(destino)}`;

        window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(msj)}`, '_blank');
    }

    initMap();
</script>
</body>
</html>
